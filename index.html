<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exodus Bible Plan</title>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f7f2e8;
  color:#111;
}
.hero{
  background:radial-gradient(circle at top,#2a241d,#050505 70%);
  color:white;
  text-align:center;
  padding:28px 18px 45px;
}
.logo{
  width:120px;
  height:120px;
  border-radius:50%;
  object-fit:cover;
}
.hero h1{margin:12px 0 4px;font-size:28px;letter-spacing:1px}
.hero p{margin:0;color:#c99b3b;font-weight:bold}

.app{
  max-width:760px;
  margin:-28px auto 90px;
  padding:0 16px;
}
.card{
  background:white;
  border-radius:24px;
  padding:22px;
  margin-bottom:18px;
  box-shadow:0 10px 30px #00000018;
}
.date{color:#555;font-weight:bold}
h2{font-size:30px;margin:14px 0 6px}
.gold{color:#b8892e;font-weight:bold}
.reading div{
  font-size:21px;
  font-weight:800;
  margin:12px 0;
}
button,a{
  width:100%;
  display:block;
  text-align:center;
  border:0;
  border-radius:16px;
  padding:16px;
  font-size:16px;
  font-weight:bold;
  margin-top:12px;
  text-decoration:none;
}
.black{background:#050505;color:white}
.goldBtn{background:#efe4cf;color:#111}
.done{background:#188038!important;color:white}
textarea{
  width:100%;
  height:130px;
  border-radius:16px;
  border:1px solid #ddd;
  padding:14px;
  font-size:16px;
  resize:none;
}
.stats{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:10px;
  text-align:center;
}
.stat{
  background:#f7f2e8;
  padding:14px;
  border-radius:16px;
}
.stat b{font-size:24px}
.calendar{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:7px;
  margin-top:15px;
}
.day{
  padding:10px 0;
  border-radius:10px;
  text-align:center;
  font-size:13px;
  background:#eee;
}
.day.read{background:#dff3df;color:#137333;font-weight:bold}
.day.missed{background:#ffe0e0;color:#b3261e}
.nav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#050505;
  display:flex;
  justify-content:space-around;
  padding:10px;
}
.nav button{
  width:auto;
  margin:0;
  background:none;
  color:white;
  font-size:13px;
}
.hidden{display:none}
.small{font-size:13px;color:#777;margin-top:10px}
</style>
</head>

<body>

<div class="hero">
  <img class="logo" src="logo.jpeg" alt="Exodus Church">
  <h1>EXODUS CHURCH</h1>
  <p>Ежедневное чтение Библии</p>
</div>

<div class="app">

<section id="todayPage" class="page">
  <div class="card">
    <div class="date" id="todayDate"></div>
    <h2>План победы 2026</h2>
    <div class="gold" id="dayNumber"></div>
    <div class="reading" id="reading"></div>

    <button id="readBtn" class="black">✓ Я прочитал</button>
    <a class="goldBtn" href="https://bibleplan.ru/plan" target="_blank">Открыть весь план</a>
  </div>

  <div class="card">
    <h3>Мои заметки</h3>
    <textarea id="note" placeholder="Что Бог сказал мне сегодня?"></textarea>
    <button class="black" onclick="saveNote()">Сохранить заметку</button>
    <div class="small">Заметки сохраняются на этом устройстве.</div>
  </div>
</section>

<section id="progressPage" class="page hidden">
  <div class="card">
    <h2>Мой прогресс</h2>
    <div class="stats">
      <div class="stat"><b id="readCount">0</b><br>Прочитано</div>
      <div class="stat"><b id="missedCount">0</b><br>Пропущено</div>
      <div class="stat"><b>365</b><br>Всего</div>
    </div>
  </div>

  <div class="card">
    <h3>Календарь года</h3>
    <div class="calendar" id="calendar"></div>
  </div>
</section>

<section id="notesPage" class="page hidden">
  <div class="card">
    <h2>Все заметки</h2>
    <div id="allNotes"></div>
  </div>
</section>

</div>

<div class="nav">
  <button onclick="showPage('todayPage')">Сегодня</button>
  <button onclick="showPage('progressPage')">Прогресс</button>
  <button onclick="showPage('notesPage')">Заметки</button>
</div>

<script>
const plan = {
"06-24":["Притчи 24","Филиппийцам 1","3 Царств 11","3 Царств 12"],
"06-25":["Притчи 25","Филиппийцам 2","3 Царств 13","3 Царств 14"],
"06-26":["Притчи 26","Филиппийцам 3","2 Паралипоменон 10","2 Паралипоменон 11"],
"06-27":["Притчи 27","Филиппийцам 4","2 Паралипоменон 12","2 Паралипоменон 13"],
"06-28":["Притчи 28","Колоссянам 1","2 Паралипоменон 14","2 Паралипоменон 15"],
"06-29":["Притчи 29","Колоссянам 2","2 Паралипоменон 16","2 Паралипоменон 17"],
"06-30":["Притчи 30","Колоссянам 3","2 Паралипоменон 18","2 Паралипоменон 19"]
};

const now = new Date();
const key = String(now.getMonth()+1).padStart(2,"0")+"-"+String(now.getDate()).padStart(2,"0");
const dayOfYear = Math.floor((now - new Date(now.getFullYear(),0,0))/86400000);

document.getElementById("todayDate").innerText =
  "Сегодня: " + now.toLocaleDateString("ru-RU",{day:"numeric",month:"long",year:"numeric"});

document.getElementById("dayNumber").innerText = "День " + dayOfYear + " из 365";

const readingBox = document.getElementById("reading");
if(plan[key]){
  readingBox.innerHTML = plan[key].map(x=>"<div>📖 "+x+"</div>").join("");
}else{
  readingBox.innerHTML = "<div>Этот день ещё нужно добавить в план.</div>";
}

const readBtn = document.getElementById("readBtn");
if(localStorage.getItem("read-"+key)){
  readBtn.innerText = "Прочитано ✅";
  readBtn.classList.add("done");
}
readBtn.onclick = function(){
  localStorage.setItem("read-"+key,"yes");
  readBtn.innerText = "Прочитано ✅";
  readBtn.classList.add("done");
  renderProgress();
};

document.getElementById("note").value = localStorage.getItem("note-"+key) || "";

function saveNote(){
  localStorage.setItem("note-"+key, document.getElementById("note").value);
  alert("Заметка сохранена");
}

function showPage(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");
  renderProgress();
  renderNotes();
}

function renderProgress(){
  let read = 0;
  let missed = 0;
  const cal = document.getElementById("calendar");
  cal.innerHTML = "";

  for(let i=1;i<=365;i++){
    const date = new Date(2026,0,i);
    const k = String(date.getMonth()+1).padStart(2,"0")+"-"+String(date.getDate()).padStart(2,"0");

    const div = document.createElement("div");
    div.className = "day";
    div.innerText = i;

    if(localStorage.getItem("read-"+k)){
      div.classList.add("read");
      read++;
    }else if(i < dayOfYear){
      div.classList.add("missed");
      missed++;
    }

    cal.appendChild(div);
  }

  document.getElementById("readCount").innerText = read;
  document.getElementById("missedCount").innerText = missed;
}

function renderNotes(){
  const box = document.getElementById("allNotes");
  box.innerHTML = "";

  for(let i=1;i<=365;i++){
    const date = new Date(2026,0,i);
    const k = String(date.getMonth()+1).padStart(2,"0")+"-"+String(date.getDate()).padStart(2,"0");
    const note = localStorage.getItem("note-"+k);

    if(note){
      box.innerHTML += `
        <div style="border-bottom:1px solid #ddd;padding:12px 0">
          <b>${date.toLocaleDateString("ru-RU",{day:"numeric",month:"long"})}</b>
          <p>${note}</p>
        </div>`;
    }
  }

  if(!box.innerHTML){
    box.innerHTML = "<p>Пока нет сохранённых заметок.</p>";
  }
}

renderProgress();
</script>

</body>
</html>
