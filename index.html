<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#111111">
  <meta name="description" content="Exodus Church — План Победы. Ежедневное чтение Библии.">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="icon" href="/icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <title>Exodus Church — План Победы</title>
  <link rel="stylesheet" href="/style.css">
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
</head>
<body>
  <div class="background"></div>
  <header class="hero">
    <img src="/logo.jpg" alt="Exodus Church" class="logo">
    <div>
      <div class="brand">EXODUS CHURCH</div>
      <div class="tagline">ЕЖЕДНЕВНОЕ ЧТЕНИЕ БИБЛИИ</div>
    </div>
  </header>

  <main class="shell">
    <section class="card top-card" id="today">
      <div class="headline">
        <div>
          <div id="date" class="date"></div>
          <h1>План Победы</h1>
          <div id="day" class="day-number"></div>
        </div>
        <button id="installBtn" class="outline hidden">Установить приложение</button>
      </div>

      <div class="grid">
        <section class="reading-panel">
          <h2>Чтение на сегодня</h2>
          <div id="readings" class="readings"></div>
          <button id="readBtn" class="primary">✓ Я прочитал сегодня</button>
        </section>

        <aside class="quote">
          <div class="quote-mark">“</div>
          <p>Не хвались завтрашним днем, потому что не знаешь, что родит тот день.</p>
          <strong>Притчи 27:1</strong>
        </aside>
      </div>
    </section>

    <section class="card" id="notes">
      <h2>Мои заметки</h2>
      <textarea id="note" maxlength="2000" placeholder="Что Бог сказал мне сегодня?"></textarea>
      <div class="row">
        <small>Заметка хранится только на этом устройстве.</small>
        <button id="saveNote" class="primary small-btn">Сохранить</button>
      </div>
    </section>

    <section class="card" id="progress">
      <div class="row">
        <h2>Календарь прогресса</h2>
        <button id="toggleCalendar" class="outline">Показать календарь</button>
      </div>
      <div class="stats">
        <div><span>Прочитано</span><b id="readCount">0</b></div>
        <div><span>Пропущено</span><b id="missedCount">0</b></div>
        <div><span>Прогресс</span><b id="percent">0%</b></div>
      </div>
      <div id="calendar" class="calendar hidden"></div>
    </section>
  </main>

  <nav class="bottom-nav">
    <button data-target="today">Сегодня</button>
    <button data-target="progress">Прогресс</button>
    <button data-target="notes">Заметки</button>
  </nav>

  <div id="toast" class="toast"></div>
  <script src="/app.js" defer></script>
</body>
</html>
