<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Exodus Bible Plan</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f7f2e8;
  color:#111;
}

.hero{
  background:radial-gradient(circle at top,#2c2418,#050505 75%);
  color:white;
  text-align:center;
  padding:30px 18px 48px;
}

.logo{
  width:125px;
  height:125px;
  border-radius:50%;
  object-fit:cover;
  box-shadow:0 0 30px #c89b3c55;
}

.hero h1{
  margin:14px 0 5px;
  font-size:28px;
  letter-spacing:1px;
}

.hero p{
  margin:0;
  color:#c89b3c;
  font-weight:bold;
}

.app{
  max-width:760px;
  margin:-30px auto 90px;
  padding:0 16px;
}

.card{
  background:white;
  border-radius:26px;
  padding:22px;
  margin-bottom:18px;
  box-shadow:0 10px 30px #00000018;
}

.date{
  color:#555;
  font-weight:bold;
}

h2{
  font-size:30px;
  margin:14px 0 6px;
}

.gold{
  color:#b8892e;
  font-weight:bold;
  margin-bottom:14px;
}

.chapter-btn{
  display:block;
  background:#f7f2e8;
  color:#111;
  padding:15px;
  border-radius:16px;
  margin:10px 0;
  font-size:20px;
  font-weight:800;
  text-align:left;
  text-decoration:none;
}

.chapter-btn:hover{
  background:#efe0c0;
}

button,a.main-btn{
  width:100%;
  display:block;
  text-align:center;
  border:0;
  border-radius:16px;
  padding:16px;
  font-size:16px;
  font-weight:bold;
  margin-top:12px;
  text-decoration:none;
  cursor:pointer;
}

.black{
  background:#050505;
  color:white;
}

.goldBtn{
  background:#efe4cf;
  color:#111;
}

.done{
  background:#188038!important;
  color:white;
}

textarea{
  width:100%;
  height:140px;
  border-radius:16px;
  border:1px solid #ddd;
  padding:14px;
  font-size:16px;
  resize:none;
}

.stats{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:10px;
  text-align:center;
}

.stat{
  background:#f7f2e8;
  padding:14px;
  border-radius:16px;
}

.stat b{
  font-size:24px;
}

.calendar{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:7px;
  margin-top:15px;
}

.day{
  padding:10px 0;
  border-radius:10px;
  text-align:center;
  font-size:13px;
  background:#eee;
}

.day.read{
  background:#dff3df;
  color:#137333;
  font-weight:bold;
}

.day.missed{
  background:#ffe0e0;
  color:#b3261e;
}

.nav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#050505;
  display:flex;
  justify-content:space-around;
  padding:10px;
  z-index:20;
}

.nav button{
  width:auto;
  margin:0;
  background:none;
  color:white;
  font-size:13px;
  padding:10px;
}

.hidden{
  display:none;
}

.small{
  font-size:13px;
  color:#777;
  margin-top:10px;
}

.note-item{
  border-bottom:1px solid #ddd;
  padding:12px 0;
}

.note-item b{
  color:#b8892e;
}
</style>
</head>

<body>

<div class="hero">
  <img class="logo" src="logo.jpeg" alt="Exodus Church Logo">
  <h1>EXODUS CHURCH</h1>
  <p>План Победы 2026</p>
</div>

<div class="app">

<section id="todayPage" class="page">
  <div class="card">
    <div class="date" id="todayDate"></div>
    <h2>Чтение на сегодня</h2>
    <div class="gold" id="dayNumber"></div>
    <div id="reading"></div>

    <button id="readBtn" class="black">✓ Я прочитал</button>
    <a class="main-btn goldBtn" href="https://bibleplan.ru/plan" target="_blank">Открыть весь план</a>
  </div>

  <div class="card">
    <h3>Мои заметки</h3>
    <textarea id="note" placeholder="Что Бог сказал мне сегодня?"></textarea>
    <button class="black" onclick="saveNote()">Сохранить заметку</button>
    <div class="small">Заметки сохраняются на этом устройстве.</div>
  </div>
</section>

<section id="progressPage" class="page hidden">
  <div class="card">
    <h2>Мой прогресс</h2>
    <div class="stats">
      <div class="stat"><b id="readCount">0</b><br>Прочитано</div>
      <div class="stat"><b id="missedCount">0</b><br>Пропущено</div>
      <div class="stat"><b>365</b><br>Всего</div>
    </div>
  </div>

  <div class="card">
    <h3>Календарь года</h3>
    <div class="calendar" id="calendar"></div>
  </div>
</section>

<section id="notesPage" class="page hidden">
  <div class="card">
    <h2>Все заметки</h2>
    <div id="allNotes"></div>
  </div>
</section>

</div>

<div class="nav">
  <button onclick="showPage('todayPage')">Сегодня</button>
  <button onclick="showPage('progressPage')">Прогресс</button>
  <button onclick="showPage('notesPage')">Заметки</button>
</div>

<script>
const plan = {
"06-24":["Притч 24","Флп 1","3 Цар 11","3 Цар 12"],
"06-25":["Притч 25","Флп 2","3 Цар 13","3 Цар 14"],
"06-26":["Притч 26","Флп 3","2 Пар 10","2 Пар 11"],
"06-27":["Притч 27","Флп 4","2 Пар 12","2 Пар 13"],
"06-28":["Притч 28","Кол 1","2 Пар 14","2 Пар 15"],
"06-29":["Притч 29","Кол 2","2 Пар 16","2 Пар 17"],
"06-30":["Притч 30","Кол 3","2 Пар 18","2 Пар 19"],

"07-01":["Притч 31","Кол 4","3 Цар 15","3 Цар 16"],
"07-02":["Пс 1","Мф 1","3 Цар 17","3 Цар 18"],
"07-03":["Пс 2","Мф 2","3 Цар 19","3 Цар 20"],
"07-04":["Пс 3","Мф 3","3 Цар 21","3 Цар 22"],
"07-05":["Пс 4","Мф 4","2 Пар 20","2 Пар 21"],
"07-06":["Пс 5","Мф 5","4 Цар 1","4 Цар 2"],
"07-07":["Пс 6","Мф 6","4 Цар 3","4 Цар 4"],
"07-08":["Пс 7","Мф 7","4 Цар 5","4 Цар 6"],
"07-09":["Пс 8","Мф 8","4 Цар 7","4 Цар 8"],
"07-10":["Пс 9","Мф 9","Авд 1"],
"07-11":["Пс 10","Мф 10","2 Пар 22"],
"07-12":["Пс 11","Мф 11","Иоил 1","Иоил 2","Иоил 3"],
"07-13":["Пс 12","Мф 12","4 Цар 9","4 Цар 10"],
"07-14":["Пс 13","Мф 13","4 Цар 11","4 Цар 12"],
"07-15":["Пс 14","Мф 14","4 Цар 13","4 Цар 14"],
"07-16":["Пс 15","Мф 15","Иона 1","Иона 2","Иона 3","Иона 4"],
"07-17":["Пс 16","Мф 16","Ам 1","Ам 2"],
"07-18":["Пс 17","Мф 17","Ам 3","Ам 4","Ам 5"],
"07-19":["Пс 18","Мф 18","Ам 6","Ам 7"],
"07-20":["Пс 19","Мф 19","Ам 8","Ам 9"],
"07-21":["Пс 20","Мф 20","2 Пар 23","2 Пар 24"],
"07-22":["Пс 21","Мф 21","2 Пар 25","2 Пар 26"],
"07-23":["Пс 22","Мф 22","Ис 1","Ис 2"],
"07-24":["Пс 23","Мф 23","Ис 3","Ис 4"],
"07-25":["Пс 24","Мф 24","Ис 5","Ис 6"],
"07-26":["Пс 25","Мф 25","2 Пар 27","2 Пар 28"],
"07-27":["Пс 26","Мф 26","4 Цар 15","4 Цар 16"],
"07-28":["Пс 27","Мф 27","Ис 7","Ис 8"],
"07-29":["Пс 28","Мф 28","Ис 9","Ис 10"],
"07-30":["Пс 29","1 Фес 1","Ис 11","Ис 12"],
"07-31":["Пс 30","1 Фес 2","Ис 13","Ис 14"]
};

const bookLinks = {
  "Притч":"proverbs",
  "Флп":"philippians",
  "Кол":"colossians",
  "Пс":"psalms",
  "Мф":"matthew",
  "3 Цар":"1-kings",
  "4 Цар":"2-kings",
  "2 Пар":"2-chronicles",
  "Авд":"obadiah",
  "Иоил":"joel",
  "Иона":"jonah",
  "Ам":"amos",
  "Ис":"isaiah",
  "1 Фес":"1-thessalonians"
};

const now = new Date();
const key = String(now.getMonth()+1).padStart(2,"0") + "-" + String(now.getDate()).padStart(2,"0");
const dayOfYear = Math.floor((now - new Date(now.getFullYear(),0,0)) / 86400000);

document.getElementById("todayDate").innerText =
  "Сегодня: " + now.toLocaleDateString("ru-RU", {
    day:"numeric",
    month:"long",
    year:"numeric"
  });

document.getElementById("dayNumber").innerText = "День " + dayOfYear + " из 365";

function chapterLink(item){
  const chapter = item.match(/\d+$/)?.[0];
  const book = item.replace(/\s\d+$/, "");
  const slug = bookLinks[book];

  if(!slug || !chapter){
    return `<div class="chapter-btn">📖 ${item}</div>`;
  }

  return `
    <a class="chapter-btn" target="_blank" href="https://bibleplan.ru/bible/${slug}/${chapter}">
      📖 ${item}
    </a>
  `;
}

const readingBox = document.getElementById("reading");

if(plan[key]){
  readingBox.innerHTML = plan[key].map(chapterLink).join("");
}else{
  readingBox.innerHTML = "<div class='chapter-btn'>Этот день ещё нужно добавить в план.</div>";
}

const readBtn = document.getElementById("readBtn");

if(localStorage.getItem("read-"+key)){
  readBtn.innerText = "Прочитано ✅";
  readBtn.classList.add("done");
}

readBtn.onclick = function(){
  localStorage.setItem("read-"+key,"yes");
  readBtn.innerText = "Прочитано ✅";
  readBtn.classList.add("done");
  renderProgress();
};

document.getElementById("note").value = localStorage.getItem("note-"+key) || "";

function saveNote(){
  localStorage.setItem("note-"+key, document.getElementById("note").value);
  alert("Заметка сохранена");
}

function showPage(id){
  document.querySelectorAll(".page").forEach(page => page.classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");
  renderProgress();
  renderNotes();
}

function renderProgress(){
  let read = 0;
  let missed = 0;
  const calendar = document.getElementById("calendar");
  calendar.innerHTML = "";

  for(let i=1; i<=365; i++){
    const date = new Date(2026,0,i);
    const k = String(date.getMonth()+1).padStart(2,"0") + "-" + String(date.getDate()).padStart(2,"0");

    const div = document.createElement("div");
    div.className = "day";
    div.innerText = i;

    if(localStorage.getItem("read-"+k)){
      div.classList.add("read");
      read++;
    }else if(i < dayOfYear){
      div.classList.add("missed");
      missed++;
    }

    calendar.appendChild(div);
  }

  document.getElementById("readCount").innerText = read;
  document.getElementById("missedCount").innerText = missed;
}

function renderNotes(){
  const box = document.getElementById("allNotes");
  box.innerHTML = "";

  for(let i=1; i<=365; i++){
    const date = new Date(2026,0,i);
    const k = String(date.getMonth()+1).padStart(2,"0") + "-" + String(date.getDate()).padStart(2,"0");
    const note = localStorage.getItem("note-"+k);

    if(note){
      box.innerHTML += `
        <div class="note-item">
          <b>${date.toLocaleDateString("ru-RU",{day:"numeric",month:"long"})}</b>
          <p>${note}</p>
        </div>
      `;
    }
  }

  if(!box.innerHTML){
    box.innerHTML = "<p>Пока нет сохранённых заметок.</p>";
  }
}

renderProgress();
</script>

</body>
</html>
